server:
    port: 9090

spring:
    application:
        name: admin-server
    security:
        user:
            name: admin
            password: "admin123"
    datasource:
      url : ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ambulance_db}
      username: root
      password: ${DB_PASSWORD}
eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: always

