server:
    port: ${SERVER_PORT:8080}
    forward-headers-strategy: FRAMEWORK

spring:
    application:
        name: api-gateway

    cloud:
        gateway:
            x-forwarded:
                enabled: true

            globalcors:
                cors-configurations:
                    "[/**]":
                        allowed-origins: "http://localhost:4200"
                        allowed-methods:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                            - OPTIONS
                            - PATCH
                        allowed-headers: "*"
                        allow-credentials: true
                add-to-simple-url-handler-mapping: true

            default-filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

            routes:
                - id: auth-route
                  uri: lb://auth-service
                  predicates:
                      - Path=/api/auth/**

                - id: measurement-route
                  uri: lb://measurement-service
                  predicates:
                      - Path=/api/user/quantities/**

                - id: user-profile-route
                  uri: lb://auth-service
                  predicates:
                      - Path=/api/user/me

                - id: user-history-route
                  uri: lb://user-service
                  predicates:
                      - Path=/api/users/**

                - id: convert-route
                  uri: lb://measurement-service
                  predicates:
                      - Path=/api/convert/**
                  filters:
                      - RewritePath=/api/convert/(?<segment>.*), /api/user/quantities/convert/${segment}

                - id: swagger-ui-html-route
                  uri: http://localhost:8080
                  predicates:
                      - Path=/swagger-ui.html

                - id: swagger-ui-resources-route
                  uri: http://localhost:8080
                  predicates:
                      - Path=/swagger-ui/**

                - id: api-docs-route
                  uri: http://localhost:8080
                  predicates:
                      - Path=/v3/api-docs/**

                - id: oauth2-route
                  uri: lb://auth-service
                  predicates:
                      - Path=/oauth2/**,/login/oauth2/**

                - id: history-alias-route
                  uri: lb://measurement-service
                  predicates:
                      - Path=/api/user/history/**
                  filters:
                      - RewritePath=/api/user/history/(?<segment>.*), /api/user/quantities/history/${segment}

        loadbalancer:
            retry:
                enabled: true

    boot:
        admin:
            client:
                url: ${SPRING_BOOT_ADMIN_URL:http://localhost:9090}
                instance:
                    prefer-ip: true
                username: admin
                password: "admin123"

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
        fetch-registry: true
        register-with-eureka: true
        healthcheck:
            enabled: true
        registry-fetch-interval-seconds: 10
        initial-instance-info-replication-interval-seconds: 10
        eureka-server-connect-timeout-seconds: 5
        eureka-server-read-timeout-seconds: 8

    instance:
        prefer-ip-address: true

management:
    endpoints:
        web:
            exposure:
                include: "*"
            base-path: /actuator
    endpoint:
        health:
            show-details: always
    info:
        env:
            enabled: true

springdoc:
    swagger-ui:
        path: /swagger-ui.html
    api-docs:
        path: /v3/api-docs
    show-actuator: true

logging:
    level:
        org.springframework.cloud.gateway: INFO
        com.quantitymeasurement.api_gateway: DEBUG
