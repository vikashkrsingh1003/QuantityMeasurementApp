spring:
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:dev}

    application:
        name: auth-service

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/quantitymeasurement_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
        driver-class-name: com.mysql.cj.jdbc.Driver
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:vikash@1006}

    jpa:
        database-platform: org.hibernate.dialect.MySQL8Dialect
        hibernate:
            ddl-auto: ${JPA_DDL_AUTO:update}
        show-sql: false
        open-in-view: false
        properties:
            hibernate:
                jdbc:
                    time_zone: UTC

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        redirect-uri: ${APP_OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
                        scope:
                            - profile
                            - email

    mail:
        host: ${MAIL_HOST:smtp.gmail.com}
        port: ${MAIL_PORT:587}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                    connectiontimeout: 5000
                    timeout: 5000
                    writetimeout: 5000

    boot:
        admin:
            client:
                url: ${SPRING_BOOT_ADMIN_URL:http://localhost:9090}
                instance:
                    prefer-ip: true
                username: admin
                password: "admin123"

server:
    port: ${SERVER_PORT:8083}
    forward-headers-strategy: FRAMEWORK
    tomcat:
        remoteip:
            remote-ip-header: x-forwarded-for
            protocol-header: x-forwarded-proto

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
        fetch-registry: true
        register-with-eureka: true

    instance:
        prefer-ip-address: true

# Custom App Config
app:
    auth:
        token-secret: ${APP_AUTH_TOKEN_SECRET:DefaultSecretKeyThatIsAtLeast32BytesLongForSecurity123!}
        token-expiration-msec: ${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
        refresh-token-expiration-msec: ${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}
        reset-password-url: ${APP_RESET_PASSWORD_URL:http://localhost:4200/reset-password}

    oauth2:
        redirectUri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

management:
    endpoints:
        web:
            exposure:
                include: "*"
            base-path: /actuator
    endpoint:
        health:
            show-details: always
    health:
        mail:
            enabled: false
    info:
        env:
            enabled: true

logging:
    level:
        root: INFO
        com.app.quantitymeasurement: INFO
        org.springframework.security: DEBUG