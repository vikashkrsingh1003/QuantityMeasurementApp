# ==============================
# MySQL Database (Production)
# Set DB_USERNAME, DB_PASSWORD, and DB_INIT_MODE in your .env or container env
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quantitymeasurement_db?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==============================
# JPA Configuration
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${DB_INIT_MODE:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==============================
# Connection Pool (HikariCP)
# ==============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ==============================
# H2 Console - Disabled in production
# ==============================
spring.h2.console.enabled=false

# ==============================
# Logging
# ==============================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

# ==============================
# Actuator
# ==============================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never

# ==============================
# Service Discovery & Redis Repository Behaviour
# ==============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.healthcheck.enabled=true
spring.cloud.loadbalancer.retry.enabled=true
spring.data.redis.repositories.enabled=false

# NOTE:
# Token blacklist service supports Redis but gracefully falls back to in-memory.
# Leave spring.redis.* unset unless a Redis instance is intentionally provisioned.
