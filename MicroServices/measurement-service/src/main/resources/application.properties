# ==============================
# Default Application Configuration
# ==============================

# ── Spring Profile ─────────────────────────────────────────────────────────────
# Default profile is 'dev' if not specified
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Server Configuration ───────────────────────────────────────────────────────
server.port=${SERVER_PORT:8081}

# ── Application Name ───────────────────────────────────────────────────────────
spring.application.name=measurement-service

# ── Eureka Client Configuration ───────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.instance.prefer-ip-address=true
spring.cloud.loadbalancer.retry.enabled=true

# ── Database Configuration (MySQL) ─────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quantitymeasurement_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:vikash@1006}

# ── JPA Configuration ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Disable Redis repository auto-configuration warnings in this service.
# Token blacklist gracefully falls back to in-memory when Redis isn't configured.
spring.data.redis.repositories.enabled=false

# ── H2 Console ─────────────────────────────────────────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ── JWT Configuration ──────────────────────────────────────────────────────────
app.auth.token-secret=${APP_AUTH_TOKEN_SECRET:DefaultSecretKeyThatIsAtLeast32BytesLongForSecurity123!}
app.auth.token-expiration-msec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
app.auth.refresh-token-expiration-msec=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}

# ── OAuth2 Configuration ───────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.security=WARN

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.info.env.enabled=true

# ── Spring Boot Admin Client ──────────────────────────────────────────────────
spring.boot.admin.client.url=${SPRING_BOOT_ADMIN_URL:http://localhost:9090}
spring.boot.admin.client.instance.prefer-ip=true
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123