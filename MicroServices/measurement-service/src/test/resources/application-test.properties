# ─────────────────────────────────────────────────────────────────────────────
# Test profile properties – uses H2 in-memory database and embedded Redis
# for isolated testing without external dependencies.
# ─────────────────────────────────────────────────────────────────────────────

# H2 Database for tests (in-memory, isolated per test run)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Dummy JWT secret (512-bit Base64) – only used during test execution
APP_AUTH_TOKEN_SECRET=dGVzdFNlY3JldEtleVRoYXRJc0F0TGVhc3Q1MTJCaXRzTG9uZ0Zvck1VU1RCZVVzZWRPbmx5SW5UZXN0c0V4ZWN1dGlvblRpbWU=
APP_AUTH_TOKEN_EXPIRATION_MSEC=3600000

# Dummy OAuth2 credentials – tokens are never issued during unit tests
GOOGLE_CLIENT_ID=test-client-id
GOOGLE_CLIENT_SECRET=test-client-secret
APP_OAUTH2_REDIRECT_URI=http://localhost:3000/oauth2/redirect

# DB init mode for tests
DB_INIT_MODE=create-drop

# Dummy SMTP credentials – emails are NOT actually sent during tests
MAIL_HOST=localhost
MAIL_PORT=25
MAIL_USERNAME=test@example.com
MAIL_PASSWORD=dummy-password
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:test@example.com}
spring.mail.password=${MAIL_PASSWORD:dummy}

# Refresh token expiry for tests
APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC=3600000

# Redis configuration for tests (embedded)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
